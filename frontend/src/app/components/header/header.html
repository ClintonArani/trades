<header class="header">
  <!-- Top Bar with Logo Left, Auth Buttons Right -->
  <div class="header-top">
    <div class="logo">
      <h1>WiseTrade</h1>
    </div>
    <div class="auth-buttons">
      <button class="btn-signup" (click)="signUpWithDeriv()">Sign Up</button>
      <button class="btn-signin" (click)="signInWithDeriv()">Sign In</button>
    </div>
  </div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <a 
        *ngFor="let navItem of navItems" 
        [routerLink]="navItem.path"
        routerLinkActive="active"
        class="nav-link"
      >
        <span class="nav-icon">{{ navItem.icon }}</span>
        <span class="nav-label">{{ navItem.label }}</span>
      </a>
    </div>
  </nav>
</header>
